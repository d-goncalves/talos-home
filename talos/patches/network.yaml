# Replace <node-ip>, <gateway-ip> with your actual network values before applying.
# This file is NOT processed by Flux — edit directly and apply with talosctl.
machine:
  network:
    interfaces:
      - interface: ens18
        addresses:
          - <node-ip>/24
        routes:
          - network: 0.0.0.0/0
            gateway: <gateway-ip>
        dhcp: false
    nameservers:
      - <gateway-ip>
