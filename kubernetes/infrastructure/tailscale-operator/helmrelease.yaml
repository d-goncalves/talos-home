apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 30m
  chart:
    spec:
      chart: tailscale-operator
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  valuesFrom:
    - kind: Secret
      name: tailscale-operator-oauth
      targetPath: oauth.clientId
      valuesKey: clientId
    - kind: Secret
      name: tailscale-operator-oauth
      targetPath: oauth.clientSecret
      valuesKey: clientSecret
  values:
    operatorConfig:
      hostname: talos-operator
