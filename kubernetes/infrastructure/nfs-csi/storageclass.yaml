apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-immich
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: nfs.csi.k8s.io
parameters:
  server: NAS_IP_PLACEHOLDER
  share: /media/immich
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - nfsvers=4.1
  - async
  - hard
