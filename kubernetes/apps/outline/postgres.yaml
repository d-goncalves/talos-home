apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: outline-postgres-data
  namespace: outline
spec:
  storageClassName: nfs-outline-postgres
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: outline-postgres
  namespace: outline
spec:
  serviceName: outline-postgres
  replicas: 1
  selector:
    matchLabels:
      app: outline-postgres
  template:
    metadata:
      labels:
        app: outline-postgres
    spec:
      securityContext:
        runAsUser: 977
        runAsGroup: 988
        fsGroup: 988
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: outline
            - name: POSTGRES_USER
              value: outline
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: outline-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: outline-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: outline-postgres
  namespace: outline
spec:
  selector:
    app: outline-postgres
  ports:
    - port: 5432
