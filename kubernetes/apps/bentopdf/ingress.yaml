apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bentopdf
  namespace: bentopdf
  annotations:
    tailscale.com/funnel: "false"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "BentoPDF"
    gethomepage.dev/description: "PDF toolkit"
    gethomepage.dev/group: "Tools"
    gethomepage.dev/icon: "mdi-file-pdf-box"
    gethomepage.dev/href: "https://bentopdf.${TAILNET_DOMAIN}"
    gethomepage.dev/pod-selector: "app=bentopdf"
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bentopdf
                port:
                  number: 8080
  tls:
    - hosts:
        - bentopdf
