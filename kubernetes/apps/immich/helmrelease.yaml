apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library

    machine-learning:
      enabled: false

    postgresql:
      enabled: true
      primary:
        persistence:
          storageClass: local-path
          size: 10Gi

    redis:
      enabled: true
      master:
        persistence:
          storageClass: local-path
          size: 1Gi

    server:
      service:
        type: NodePort
        nodePort: 32283
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
