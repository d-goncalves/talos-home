apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            env:
              DB_HOSTNAME: immich-postgres
              DB_USERNAME: immich
              DB_DATABASE_NAME: immich
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-secrets
                    key: POSTGRES_PASSWORD

    immich:
      persistence:
        library:
          existingClaim: immich-library

    machine-learning:
      enabled: false

    valkey:
      enabled: true
      persistence:
        data:
          type: persistentVolumeClaim
          storageClass: local-path
          size: 1Gi
          accessMode: ReadWriteOnce

