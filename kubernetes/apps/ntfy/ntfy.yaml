apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntfy-data
  namespace: ntfy
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: ntfy
data:
  server.yml: |
    base-url: https://ntfy.<tailnet>.ts.net
    cache-file: /var/cache/ntfy/cache.db
    auth-file: /var/lib/ntfy/auth.db
    auth-default-access: deny-all
    behind-proxy: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-admin
  namespace: ntfy
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: ntfy-admin
  dataFrom:
    - extract:
        key: urj7zb5nix3q5h3uyaivnvt63q  # ntfy item in Server Infrastructure vault
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: ntfy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      initContainers:
        - name: create-admin
          image: binwiederhier/ntfy:latest
          command:
            - sh
            - -c
            - |
              if ntfy user list 2>/dev/null | grep -q "diogo"; then
                echo "User already exists, skipping"
              else
                printf '%s\n%s\n' "$NTFY_ADMIN_PASSWORD" "$NTFY_ADMIN_PASSWORD" | ntfy user add --role=admin diogo || true
              fi
          env:
            - name: NTFY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ntfy-admin
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/ntfy
            - name: config
              mountPath: /etc/ntfy/server.yml
              subPath: server.yml
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:latest
          args: ["serve"]
          ports:
            - containerPort: 80
          env:
            - name: TZ
              value: Europe/Lisbon
          volumeMounts:
            - name: data
              mountPath: /var/lib/ntfy
            - name: cache
              mountPath: /var/cache/ntfy
            - name: config
              mountPath: /etc/ntfy/server.yml
              subPath: server.yml
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
        - name: cache
          emptyDir: {}
        - name: config
          configMap:
            name: ntfy-config
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: ntfy
spec:
  selector:
    app: ntfy
  ports:
    - port: 80
