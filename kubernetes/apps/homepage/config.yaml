apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Home
    theme: dark
    color: zinc
    headerStyle: clean
    background:
      image: /images/background.jpg
      blur: sm
      saturate: 50
      opacity: 30
    layout:
      Media:
        style: row
        columns: 4
      Finance:
        style: row
        columns: 4
      Tools:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 4

  bookmarks.yaml: |
    []

  services.yaml: |
    - Media:
        - Jellyfin:
            href: https://jellyfin.${TAILNET_DOMAIN}
            description: Media server
            icon: jellyfin.png
        - Jellyseerr:
            href: https://jellyseerr.${TAILNET_DOMAIN}
            description: Request movies & TV
            icon: jellyseerr.png
        - Immich:
            href: https://immich.${TAILNET_DOMAIN}
            description: Photo library
            icon: immich.png
        - Audiobookshelf:
            href: https://audiobookshelf.${TAILNET_DOMAIN}
            description: Audiobooks & podcasts
            icon: audiobookshelf.png

    - Finance:
        - Actual Budget:
            href: https://actualbudget.${TAILNET_DOMAIN}
            description: Personal finance
            icon: actual-budget.png
        - Wallos:
            href: https://wallos.${TAILNET_DOMAIN}
            description: Subscription tracker
            icon: wallos.png

    - Tools:
        - Homebox:
            href: https://homebox.${TAILNET_DOMAIN}
            description: Home inventory
            icon: homebox.png
        - AdventureLog:
            href: https://adventurelog.${TAILNET_DOMAIN}
            description: Travel tracker
            icon: mdi-map-marker-path
        - IT Tools:
            href: https://it-tools.${TAILNET_DOMAIN}
            description: Developer utilities
            icon: it-tools.png
        - BentoPDF:
            href: https://bentopdf.${TAILNET_DOMAIN}
            description: PDF toolkit
            icon: mdi-file-pdf-box

    - Infrastructure:
        - Gitea:
            href: https://gitea.${TAILNET_DOMAIN}
            description: Git repositories
            icon: gitea.png
        - Outline:
            href: https://outline.${TAILNET_DOMAIN}
            description: Wiki & docs
            icon: outline.png
        - Grafana:
            href: https://grafana.${TAILNET_DOMAIN}
            description: Metrics & logs
            icon: grafana.png
        - Prowlarr:
            href: https://prowlarr.${TAILNET_DOMAIN}
            description: Indexer manager
            icon: prowlarr.png
        - qBittorrent:
            href: https://qbittorrent.${TAILNET_DOMAIN}
            description: Torrent client
            icon: qbittorrent.png
        - Sonarr:
            href: https://sonarr.${TAILNET_DOMAIN}
            description: TV shows
            icon: sonarr.png
        - Radarr:
            href: https://radarr.${TAILNET_DOMAIN}
            description: Movies
            icon: radarr.png
        - Bazarr:
            href: https://bazarr.${TAILNET_DOMAIN}
            description: Subtitles
            icon: bazarr.png
        - WatchYourLAN:
            href: https://watchyourlan.${TAILNET_DOMAIN}
            description: Network monitor
            icon: watchyourlan.png
        - LibreSpeed:
            href: https://librespeed.${TAILNET_DOMAIN}
            description: Speed test
            icon: librespeed.png
        - Uptime Kuma:
            href: https://uptime-kuma.${TAILNET_DOMAIN}
            description: Uptime monitoring
            icon: uptime-kuma.png
        - Ntfy:
            href: https://ntfy.${TAILNET_DOMAIN}
            description: Push notifications
            icon: ntfy.png

  widgets.yaml: |
    []

  kubernetes.yaml: |
    mode: disabled

  docker.yaml: |
    {}

  custom.css: |
    /* Make page wrapper transparent so background image shows through */
    html, body, #__next, main {
      background: transparent !important;
    }

    /* ── Service cards: opaque enough to be consistent everywhere ── */
    .service-card {
      background: rgba(18, 18, 30, 0.85) !important;
      border: 1px solid rgba(255, 255, 255, 0.07) !important;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s !important;
    }

    .service-card:hover {
      background: rgba(30, 20, 55, 0.95) !important;
      border-color: rgba(150, 80, 255, 0.4) !important;
      box-shadow: 0 4px 24px rgba(100, 40, 200, 0.18) !important;
      transform: translateY(-2px) !important;
    }

    /* ── Section headers ── */
    h2 {
      color: transparent !important;
      background: linear-gradient(90deg, #a855f7 0%, #818cf8 60%, #60a5fa 100%) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      font-size: 0.68rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.14em !important;
      text-transform: uppercase !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(130, 80, 240, 0.4);
      border-radius: 4px;
    }
