apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Home
    theme: dark
    color: zinc
    headerStyle: clean
    layout:
      Media:
        style: row
        columns: 4
      Finance:
        style: row
        columns: 3
      Tools:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 4

  bookmarks.yaml: |
    []

  services.yaml: |
    - Media:
        - Jellyfin:
            href: https://jellyfin.<tailnet>.ts.net
            description: Media server
            icon: jellyfin.png
        - Jellyseerr:
            href: https://jellyseerr.<tailnet>.ts.net
            description: Request movies & TV
            icon: jellyseerr.png
        - Immich:
            href: https://immich.<tailnet>.ts.net
            description: Photo library
            icon: immich.png
        - Audiobookshelf:
            href: https://audiobookshelf.<tailnet>.ts.net
            description: Audiobooks & podcasts
            icon: audiobookshelf.png

    - Finance:
        - Actual Budget:
            href: https://actualbudget.<tailnet>.ts.net
            description: Personal finance
            icon: actual-budget.png
        - Wallos:
            href: https://wallos.<tailnet>.ts.net
            description: Subscription tracker
            icon: wallos.png

    - Tools:
        - Homebox:
            href: https://homebox.<tailnet>.ts.net
            description: Home inventory
            icon: homebox.png
        - AdventureLog:
            href: https://adventurelog.<tailnet>.ts.net
            description: Travel tracker
            icon: mdi-map-marker-path
        - IT Tools:
            href: https://it-tools.<tailnet>.ts.net
            description: Developer utilities
            icon: it-tools.png
        - BentoPDF:
            href: https://bentopdf.<tailnet>.ts.net
            description: PDF toolkit
            icon: mdi-file-pdf-box

    - Infrastructure:
        - Gitea:
            href: https://gitea.<tailnet>.ts.net
            description: Git repositories
            icon: gitea.png
        - Grafana:
            href: https://grafana.<tailnet>.ts.net
            description: Metrics & logs
            icon: grafana.png
        - Prowlarr:
            href: https://prowlarr.<tailnet>.ts.net
            description: Indexer manager
            icon: prowlarr.png
        - qBittorrent:
            href: https://qbittorrent.<tailnet>.ts.net
            description: Torrent client
            icon: qbittorrent.png
        - Sonarr:
            href: https://sonarr.<tailnet>.ts.net
            description: TV shows
            icon: sonarr.png
        - Radarr:
            href: https://radarr.<tailnet>.ts.net
            description: Movies
            icon: radarr.png
        - Bazarr:
            href: https://bazarr.<tailnet>.ts.net
            description: Subtitles
            icon: bazarr.png
        - WatchYourLAN:
            href: https://watchyourlan.<tailnet>.ts.net
            description: Network monitor
            icon: watchyourlan.png
        - LibreSpeed:
            href: https://librespeed.<tailnet>.ts.net
            description: Speed test
            icon: librespeed.png

  widgets.yaml: |
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hour12: false

  kubernetes.yaml: |
    mode: disabled

  docker.yaml: |
    {}

  custom.css: |
    /* ── Background: layered radial gradients over near-black ── */
    html::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 60% 40% at 15% 25%, rgba(99, 30, 160, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(20, 50, 140, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 80% 60% at 50% 110%, rgba(10, 30, 80, 0.4) 0%, transparent 60%),
        #07070f;
    }

    /* Make the page wrapper transparent so the pseudo-element shows */
    html, body, #__next, main {
      background: transparent !important;
    }

    /* ── Service cards ── */
    .service-card {
      background: rgba(255, 255, 255, 0.045) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s !important;
    }

    .service-card:hover {
      background: rgba(120, 60, 220, 0.12) !important;
      border-color: rgba(150, 80, 255, 0.35) !important;
      box-shadow: 0 0 20px rgba(120, 60, 220, 0.15) !important;
      transform: translateY(-2px) !important;
    }

    /* ── Section group headers ── */
    #information-widgets ~ div h2,
    .services-group > h2,
    h2 {
      color: transparent !important;
      background: linear-gradient(90deg, #c084fc 0%, #818cf8 50%, #60a5fa 100%) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      font-size: 0.7rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase !important;
    }

    /* ── Widget bar (datetime) ── */
    #information-widgets {
      background: rgba(255, 255, 255, 0.03) !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06) !important;
      backdrop-filter: blur(12px) !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(130, 80, 240, 0.5);
      border-radius: 4px;
    }
