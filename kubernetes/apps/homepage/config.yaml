apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Home
    theme: dark
    color: zinc
    headerStyle: clean
    layout:
      Media:
        style: row
        columns: 4
      Finance:
        style: row
        columns: 3
      Tools:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 4

  bookmarks.yaml: |
    []

  services.yaml: |
    - Media:
        - Jellyfin:
            href: https://jellyfin.<tailnet>.ts.net
            description: Media server
            icon: jellyfin.png
        - Jellyseerr:
            href: https://jellyseerr.<tailnet>.ts.net
            description: Request movies & TV
            icon: jellyseerr.png
        - Immich:
            href: https://immich.<tailnet>.ts.net
            description: Photo library
            icon: immich.png
        - Audiobookshelf:
            href: https://audiobookshelf.<tailnet>.ts.net
            description: Audiobooks & podcasts
            icon: audiobookshelf.png

    - Finance:
        - Actual Budget:
            href: https://actualbudget.<tailnet>.ts.net
            description: Personal finance
            icon: actual-budget.png
        - Wallos:
            href: https://wallos.<tailnet>.ts.net
            description: Subscription tracker
            icon: wallos.png

    - Tools:
        - Homebox:
            href: https://homebox.<tailnet>.ts.net
            description: Home inventory
            icon: homebox.png
        - AdventureLog:
            href: https://adventurelog.<tailnet>.ts.net
            description: Travel tracker
            icon: mdi-map-marker-path
        - IT Tools:
            href: https://it-tools.<tailnet>.ts.net
            description: Developer utilities
            icon: it-tools.png
        - BentoPDF:
            href: https://bentopdf.<tailnet>.ts.net
            description: PDF toolkit
            icon: mdi-file-pdf-box

    - Infrastructure:
        - Gitea:
            href: https://gitea.<tailnet>.ts.net
            description: Git repositories
            icon: gitea.png
        - Grafana:
            href: https://grafana.<tailnet>.ts.net
            description: Metrics & logs
            icon: grafana.png
        - Prowlarr:
            href: https://prowlarr.<tailnet>.ts.net
            description: Indexer manager
            icon: prowlarr.png
        - qBittorrent:
            href: https://qbittorrent.<tailnet>.ts.net
            description: Torrent client
            icon: qbittorrent.png
        - Sonarr:
            href: https://sonarr.<tailnet>.ts.net
            description: TV shows
            icon: sonarr.png
        - Radarr:
            href: https://radarr.<tailnet>.ts.net
            description: Movies
            icon: radarr.png
        - Bazarr:
            href: https://bazarr.<tailnet>.ts.net
            description: Subtitles
            icon: bazarr.png
        - WatchYourLAN:
            href: https://watchyourlan.<tailnet>.ts.net
            description: Network monitor
            icon: watchyourlan.png
        - LibreSpeed:
            href: https://librespeed.<tailnet>.ts.net
            description: Speed test
            icon: librespeed.png

  widgets.yaml: |
    []

  kubernetes.yaml: |
    mode: disabled

  docker.yaml: |
    {}

  custom.css: |
    /* ── Background: subtle gradient, mostly solid dark ── */
    html::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 70% 50% at 100% 0%, rgba(80, 20, 140, 0.2) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 0% 100%, rgba(20, 40, 120, 0.15) 0%, transparent 55%),
        #09090f;
    }

    /* Make page wrapper transparent */
    html, body, #__next, main {
      background: transparent !important;
    }

    /* ── Service cards: opaque enough to be consistent everywhere ── */
    .service-card {
      background: rgba(18, 18, 30, 0.85) !important;
      border: 1px solid rgba(255, 255, 255, 0.07) !important;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s !important;
    }

    .service-card:hover {
      background: rgba(30, 20, 55, 0.95) !important;
      border-color: rgba(150, 80, 255, 0.4) !important;
      box-shadow: 0 4px 24px rgba(100, 40, 200, 0.18) !important;
      transform: translateY(-2px) !important;
    }

    /* ── Section headers ── */
    h2 {
      color: transparent !important;
      background: linear-gradient(90deg, #a855f7 0%, #818cf8 60%, #60a5fa 100%) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      font-size: 0.68rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.14em !important;
      text-transform: uppercase !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(130, 80, 240, 0.4);
      border-radius: 4px;
    }
