apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: adventurelog-secrets
  namespace: adventurelog
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: adventurelog-secrets
  dataFrom:
    - extract:
        key: REPLACE_WITH_1PASSWORD_ITEM_ID  # AdventureLog item in Server Infrastructure vault
        # Required fields in 1Password:
        #   DJANGO_ADMIN_PASSWORD  — Django superuser password
        #   DJANGO_ADMIN_EMAIL     — Django superuser email
        #   SECRET_KEY             — Django secret key (run: openssl rand -hex 32)
        #   POSTGRES_PASSWORD      — PostgreSQL password
