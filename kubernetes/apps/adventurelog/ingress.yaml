apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adventurelog
  namespace: adventurelog
  annotations:
    tailscale.com/funnel: "false"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "AdventureLog"
    gethomepage.dev/description: "Travel tracker"
    gethomepage.dev/group: "Productivity"
    gethomepage.dev/icon: "adventurelog"
    gethomepage.dev/href: "https://adventurelog.<tailnet>.ts.net"
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: adventurelog-frontend
                port:
                  number: 3000
  tls:
    - hosts:
        - adventurelog
