apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homebox-data-nfs
  namespace: homebox
spec:
  storageClassName: nfs-homebox
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homebox
  namespace: homebox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homebox
  template:
    metadata:
      labels:
        app: homebox
    spec:
      containers:
        - name: homebox
          image: ghcr.io/sysadminsmedia/homebox:latest
          ports:
            - containerPort: 7745
          env:
            - name: TZ
              value: Europe/Lisbon
            - name: HBOX_OPTIONS_ALLOW_REGISTRATION
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: homebox-data-nfs
---
apiVersion: v1
kind: Service
metadata:
  name: homebox
  namespace: homebox
spec:
  selector:
    app: homebox
  ports:
    - port: 7745
