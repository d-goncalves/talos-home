# Gitea is deployed via Helm (not Flux HelmRelease) to avoid a chicken-and-egg
# dependency (Flux uses Gitea as its GitRepository source).
#
# To install or upgrade:
#   helm repo add gitea https://dl.gitea.com/charts
#   helm upgrade --install gitea gitea/gitea -n gitea -f values.yaml
#
# The admin password is stored in 1Password ("Gitea" in Server Infrastructure vault).
# passwordMode: initialOnlyNoReset means restarts will never overwrite the password.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - ingress.yaml
  - service.yaml
