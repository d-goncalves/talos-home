gitea:
  admin:
    username: admin
    password: changeme
    email: REDACTED_EMAIL

  config:
    database:
      DB_TYPE: sqlite3
      PATH: /data/gitea/gitea.db
    server:
      DOMAIN: gitea.<tailnet>.ts.net
      ROOT_URL: https://gitea.<tailnet>.ts.net
    cache:
      ADAPTER: memory
    session:
      PROVIDER: memory
    queue:
      TYPE: level

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi

postgresql-ha:
  enabled: false

postgresql:
  enabled: false

redis-cluster:
  enabled: false

redis:
  enabled: false

valkey-cluster:
  enabled: false

valkey:
  enabled: false

service:
  http:
    type: ClusterIP
    port: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi
