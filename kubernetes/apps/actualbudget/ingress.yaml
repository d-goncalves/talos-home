apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: actualbudget
  namespace: actualbudget
  annotations:
    tailscale.com/funnel: "false"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: "Actual Budget"
    gethomepage.dev/description: "Personal finance"
    gethomepage.dev/group: "Finance"
    gethomepage.dev/icon: "actual-budget"
    gethomepage.dev/href: "https://actualbudget.<tailnet>.ts.net"
    gethomepage.dev/pod-selector: "app=actualbudget"
spec:
  ingressClassName: tailscale
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: actualbudget
                port:
                  number: 5006
  tls:
    - hosts:
        - actualbudget
