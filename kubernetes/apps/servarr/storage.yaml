# Static PV — mounts /servarr directly on NAS so hardlinks work across
# downloads and media (same filesystem, no pvc-uuid subdirectory)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: servarr-data
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=3
    - nolock
    - async
    - hard
  nfs:
    server: NAS_IP_PLACEHOLDER
    path: /volume/NAS_DATA_PATH_PLACEHOLDER/servarr
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: servarr-data
  namespace: servarr
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Ti
  storageClassName: ""
  volumeName: servarr-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config
  namespace: servarr
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
