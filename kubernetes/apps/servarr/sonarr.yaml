apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: servarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      initContainers:
        - name: init-config
          image: alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /config
              if [ ! -f /config/config.xml ]; then
                cat > /config/config.xml <<XML
              <Config>
                <InstanceName>Sonarr</InstanceName>
                <ApiKey>${SONARR_API_KEY}</ApiKey>
                <AuthenticationMethod>Forms</AuthenticationMethod>
                <AuthenticationRequired>Enabled</AuthenticationRequired>
                <Branch>main</Branch>
                <LogLevel>info</LogLevel>
                <Port>8989</Port>
                <UrlBase></UrlBase>
              </Config>
              XML
              fi
          env:
            - name: SONARR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: servarr-secrets
                  key: SONARR_API_KEY
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Lisbon
          ports:
            - containerPort: 8989
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: data
          persistentVolumeClaim:
            claimName: servarr-data
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: servarr
spec:
  selector:
    app: sonarr
  ports:
    - port: 8989
