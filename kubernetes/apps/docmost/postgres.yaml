apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: docmost-postgres
  namespace: docmost
spec:
  serviceName: docmost-postgres
  replicas: 1
  selector:
    matchLabels:
      app: docmost-postgres
  template:
    metadata:
      labels:
        app: docmost-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: docmost
            - name: POSTGRES_USER
              value: docmost
            - name: POSTGRES_PASSWORD
              value: docmost
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: docmost-postgres
  namespace: docmost
spec:
  selector:
    app: docmost-postgres
  ports:
    - port: 5432
