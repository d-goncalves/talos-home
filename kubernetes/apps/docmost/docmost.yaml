apiVersion: apps/v1
kind: Deployment
metadata:
  name: docmost
  namespace: docmost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docmost
  template:
    metadata:
      labels:
        app: docmost
    spec:
      containers:
        - name: docmost
          image: docmost/docmost:latest
          env:
            - name: APP_URL
              value: https://docmost.<tailnet>.ts.net
            - name: APP_SECRET
              value: changeme-use-a-long-random-string
            - name: DATABASE_URL
              value: postgresql://docmost:docmost@docmost-postgres:5432/docmost
            - name: REDIS_URL
              value: redis://docmost-redis:6379
          volumeMounts:
            - name: storage
              mountPath: /app/data/storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: docmost-storage
---
apiVersion: v1
kind: Service
metadata:
  name: docmost
  namespace: docmost
spec:
  selector:
    app: docmost
  ports:
    - port: 3000
