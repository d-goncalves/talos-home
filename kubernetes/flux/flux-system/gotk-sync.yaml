apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: master
  secretRef:
    name: flux-system
  timeout: 60s
  # Bootstrap-only: this URL must be a real address. It cannot use Flux variable
  # substitution because the GitRepository source is what Flux reads first.
  # When forking, replace this with your own Gitea SSH address.
  url: ssh://git@gitea-ssh.coyote-aeolian.ts.net/admin/talos-home.git
