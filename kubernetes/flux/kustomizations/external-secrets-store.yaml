apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-store
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infrastructure
  path: ./kubernetes/infrastructure/external-secrets/store
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
